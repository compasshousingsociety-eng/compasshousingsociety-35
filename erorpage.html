<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <title>404 · Page Not Found | Compass Real Estate</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- globalstyles.css (placeholder) -->
    <link rel="stylesheet" href="globalstyles.css" />

    <style>
        /* ---------- ROOT (only 3 colors + light/dark) ---------- */
        :root {
            --primary: #603F83;
            --white: #ffffff;
            --black: #000000;
            --bg-light: #ffffff;
            --text-light: #000000;
            --bg-dark: #000000;
            --text-dark: #ffffff;
            --bg-main: var(--bg-light);
            --text-main: var(--text-light);
        }

        :root[data-theme="dark"] {
            --bg-light: #000000;
            --bg-dark: #000000;
            --text-light: #ffffff;
            --text-dark: #ffffff;
            --bg-main: #000000;
            --text-main: #ffffff;
        }

        /* ---------- GLOBAL ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding-top: 80px;
            transition: background-color 0.3s ease, color 0.3s ease;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* background logo (transparent) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("images/transparent-logo-1.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: 600px auto;
            opacity: 0.10;
            pointer-events: none;
            z-index: -1;
            transition: opacity 0.3s ease;
        }

        /* ---------- FIXED HIERARCHY FONT SIZES ---------- */
        h1 {
            font-size: 46px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        h2 {
            font-size: 34px;
            font-weight: 700;
        }

        h3 {
            font-size: 24px;
            font-weight: 700;
        }

        h4 {
            font-size: 23px;
            font-weight: 700;
        }

        h5 {
            font-size: 22px;
            font-weight: 700;
        }

        h6 {
            font-size: 21px;
            font-weight: 700;
        }

        p,
        span,
        li,
        .fs-18,
        .nav-link,
        .btn,
        input,
        label,
        .card-text {
            font-size: 18px !important;
            line-height: normal;
        }

        /* ---------- STICKY HEADER ---------- */
        .fixed-top {
            background-color: var(--bg-main) !important;
            border-bottom: 1px solid rgba(96, 63, 131, 0.10);
            backdrop-filter: blur(6px);
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.02);
            transition: background-color 0.3s ease;
        }

        .navbar-brand {
            color: var(--text-main) !important;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .navbar-brand i {
            color: var(--primary);
            margin-right: 8px;
        }

        .nav-link {
            color: var(--text-main) !important;
            font-size: 18px !important;
            padding: 0.5rem 1rem !important;
            border-radius: 60px;
            transition: all 0.25s ease;
        }

        .nav-link:hover,
        .nav-link:focus,
        .nav-link.active {
            background-color: var(--primary) !important;
            color: var(--white) !important;
            box-shadow: 0 6px 18px rgba(96, 63, 131, 0.25);
            transform: translateY(-2px);
        }

        .theme-toggle {
            background: transparent;
            border: 1.5px solid var(--primary);
            color: var(--text-main);
            border-radius: 60px;
            padding: 6px 18px;
            font-size: 18px;
            transition: all 0.25s ease;
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
            transform: scale(1.04);
        }

        /* ---------- BUTTONS ---------- */
        .btn-primary-custom {
            background: var(--primary);
            color: var(--white);
            border: 2px solid var(--primary);
            border-radius: 60px;
            padding: 14px 44px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 4px 14px rgba(96, 63, 131, 0.2);
            position: relative;
            overflow: hidden;
            text-decoration: none !important;
            display: inline-block;
            font-size: 18px !important;
        }

        .btn-primary-custom::after {
            content: "";
            position: absolute;
            inset: 0;
            background: var(--white);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 60px;
        }

        .btn-primary-custom:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 32px rgba(96, 63, 131, 0.35);
            color: var(--primary);
            background: transparent;
            border-color: var(--primary);
            text-decoration: none !important;
        }

        .btn-primary-custom:hover::after {
            opacity: 0.08;
        }

        .btn-primary-custom:active {
            transform: scale(0.96);
        }

        a {
            text-decoration: none !important;
        }

        /* ---------- 404 PAGE SPECIFIC STYLES ---------- */
        .section-gap {
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .section-padding {
            padding-top: 40px;
            padding-bottom: 40px;
        }



        @media (max-width: 576px) {
            h1 {
                font-size: 38px;
            }

            h2 {
                font-size: 28px;
            }

            h3 {
                font-size: 22px;
            }

            .section-padding {
                padding-top: 28px;
                padding-bottom: 28px;
            }

            .section-gap {
                margin-top: 28px;
                margin-bottom: 28px;
            }
        }

        .navbar-toggler-custom {
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 32px;
            padding: 0 8px;
            transition: 0.25s ease;
        }

        .navbar-toggler-custom:hover,
        .navbar-toggler-custom:focus {
            color: var(--primary);
            transform: rotate(4deg);
        }

        .navbar-toggler-custom.active {
            color: var(--primary);
        }

        /* 404 Illustration */
        .error-illustration {
            position: relative;
            display: inline-block;
            text-align: center;
        }

        .error-illustration .house-icon {
            font-size: 120px;
            color: var(--primary);
            opacity: 0.3;
            display: block;
        }

        .error-illustration .compass-icon {
            font-size: 60px;
            color: var(--primary);
            position: absolute;
            bottom: -10px;
            right: 10px;
            background: var(--bg-main);
            border-radius: 50%;
            padding: 12px;
            box-shadow: 0 4px 20px rgba(96, 63, 131, 0.15);
        }

        .error-illustration .error-number {
            font-size: 80px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            opacity: 0.10;
            position: absolute;
            top: -10px;
            right: -30px;
            pointer-events: none;
            user-select: none;
        }

        @media (max-width: 576px) {
            .error-illustration .house-icon {
                font-size: 80px;
            }

            .error-illustration .compass-icon {
                font-size: 40px;
                padding: 8px;
                bottom: -5px;
                right: 0;
            }

            .error-illustration .error-number {
                font-size: 50px;
                top: -5px;
                right: -15px;
            }
        }

        .error-container {
            text-align: center;
            padding: 40px 0;
        }

        .error-container h1 {
            font-size: 46px;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 20px;
        }

        .error-container h1 span {
            color: var(--primary);
        }

        .error-container p {
            color: var(--text-main);
            opacity: 0.7;
            max-width: 400px;
            margin: 12px auto 30px;
        }
    </style>
</head>

<body>

    <!-- ============ HEADER (sticky) ============ -->
    <div id="site-header" class="fixed-top">
        <nav class="navbar navbar-expand-lg py-2">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <i class="bi bi-compass-fill"></i> Compass<span style="color:var(--primary);">.</span>
                </a>
                <button class="navbar-toggler-custom d-lg-none" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <i class="bi bi-list"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-1">
                        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Services</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Properties</a></li>
                        <li class="nav-item">
                            <button class="theme-toggle ms-2" id="themeToggle" aria-label="Toggle theme">
                                <i class="bi bi-moon-fill" id="themeIcon"></i>
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="container section-padding" style="flex:1; display:flex; align-items:center; justify-content:center;">

        <!-- 404 ERROR SECTION - Simple with just image and button -->
        <div class="error-container">
            <div class="error-illustration">
                <img src="https://cdn.pixabay.com/photo/2024/07/20/17/12/warning-8908707_1280.png" alt="" width="400"
                    height="200">
            </div>

            <h1>Oops! Page not found</h1>
            <p>The property you're looking for seems to have been sold or moved.</p>

            <a href="index.html" class="btn-primary-custom">
                <i class="bi bi-house me-2"></i>Back to Home
            </a>
        </div>

    </main>

    <!-- ============ FOOTER (preserved - using side-footer) ============ -->
    <div id="side-footer"></div>

    <!-- scripts -->
    <script src="footer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="header.js"></script>

    <!-- ====== custom JS ====== -->
    <script>
        (function () {
            // Theme toggle
            const toggleBtn = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const html = document.documentElement;

            function setTheme(theme) {
                if (theme === 'dark') {
                    html.setAttribute('data-theme', 'dark');
                    icon.className = 'bi bi-sun-fill';
                } else {
                    html.removeAttribute('data-theme');
                    icon.className = 'bi bi-moon-fill';
                }
                localStorage.setItem('theme', theme);
            }

            const saved = localStorage.getItem('theme') || 'light';
            setTheme(saved);

            toggleBtn.addEventListener('click', function (e) {
                e.preventDefault();
                const current = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                setTheme(current);
            });

            // Navbar toggler active
            const toggler = document.querySelector('.navbar-toggler-custom');
            const collapse = document.getElementById('navbarContent');
            if (toggler && collapse) {
                collapse.addEventListener('show.bs.collapse', function () {
                    toggler.classList.add('active');
                    toggler.setAttribute('aria-expanded', 'true');
                });
                collapse.addEventListener('hide.bs.collapse', function () {
                    toggler.classList.remove('active');
                    toggler.setAttribute('aria-expanded', 'false');
                });
            }

            const emailPattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z-]{2,}\.(com|in|org|net)$/i;

        })();
    </script>
</body>
